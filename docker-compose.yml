services:
  parser:
    build: .
    container_name: data-collection-service-in-excel
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 5000
      LOG_DIR: /app/logs
      FEED_DIR: /app/feeds
      LOGS_FILE: /app/logs/logs.json
      UNIFIED_LOG_FILE: /app/logs/app.log
      EXPORT_DIR: /app/exports
      FILE_IMPORT_DIR: /app/storage/file-import
      TMPDIR: /tmp/parser
      FORCE_BROWSER_SETUP: 0
      SQLITE_JOURNAL_MODE: WAL
      SQLITE_BUSY_TIMEOUT_MS: 30000
      WEB_GRACEFUL_TIMEOUT: 90
      GUNICORN_ACCESS_LOG: 0
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./feeds:/app/feeds
      - ./storage:/app/storage
    shm_size: "768m"
    mem_limit: "4g"
    memswap_limit: "5g"
    cpus: 2
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    stop_grace_period: 90s
