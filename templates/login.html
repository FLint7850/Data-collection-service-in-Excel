<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101418;
      --panel: #171d23;
      --panel-soft: #1d252c;
      --text: #edf3f6;
      --muted: #9aaab4;
      --line: #2d3943;
      --primary: #2da89d;
      --primary-dark: #23887f;
      --danger: #d2645f;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.28);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .login-panel {
      width: min(100%, 360px);
      padding: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0 0 18px;
      font-size: 1.35rem;
      line-height: 1.25;
    }

    label {
      display: grid;
      gap: 7px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input {
      width: 100%;
      height: 42px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      background: var(--panel-soft);
      font: inherit;
    }

    input:focus {
      outline: 2px solid rgba(45, 168, 157, 0.24);
      border-color: var(--primary);
    }

    button {
      width: 100%;
      height: 42px;
      border: 0;
      border-radius: 6px;
      background: var(--primary);
      color: #061412;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--primary-dark);
    }

    .error {
      margin: 0 0 14px;
      color: var(--danger);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="login-panel">
    <h1>Вход в сервис</h1>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label>
        Логин
        <input name="username" type="text" autocomplete="username" required autofocus>
      </label>
      <label>
        Пароль
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <button type="submit">Войти</button>
    </form>
  </main>
</body>
</html>
