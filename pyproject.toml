[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
pythonpath = ["."]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["E4", "E7", "E9", "F"]

[tool.ruff.lint.per-file-ignores]
"parser_app/runtime.py" = ["E402", "F401"]
"parser_app/services/*.py" = ["F403", "F405"]
"parser_app/routes/*.py" = ["F403", "F405"]
